<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#05070a" />
<title>Dual Thumb Scratch Lab — Trajectory Platter</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #05070a;
    --thumb-y: 58dvh;
    --wheel-size: min(38vw, 166px);
    --active-opacity: .96;
    --idle-opacity: .20;
    --ghost-opacity: .075;
    --divider: rgba(255,255,255,.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    min-height: 100dvh;
    overscroll-behavior: none;
    touch-action: none;
    color: #f5f7fb;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 22% 65%, rgba(87,119,162,.10), transparent 27%),
      radial-gradient(circle at 78% 65%, rgba(158,92,108,.09), transparent 27%),
      linear-gradient(180deg, #080a0e, #040507 78%);
  }

  button, input { font: inherit; }
  button { color: inherit; }

  .app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    isolation: isolate;
  }

  .app::after {
    content: "";
    position: fixed;
    top: calc(env(safe-area-inset-top) + 8px);
    bottom: calc(env(safe-area-inset-bottom) + 8px);
    left: 50%;
    width: 1px;
    transform: translateX(-.5px);
    background: linear-gradient(180deg, transparent, var(--divider) 10% 88%, transparent);
    pointer-events: none;
    z-index: 8;
  }

  .deck {
    --accent-rgb: 139, 180, 234;
    --side-sign: 1;
    position: relative;
    min-width: 0;
    overflow: hidden;
    touch-action: none;
  }
  .deck.right { --accent-rgb: 237, 143, 161; --side-sign: -1; }

  .deck::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(var(--accent-rgb), .035), transparent 32% 68%, rgba(var(--accent-rgb), .025)),
      repeating-linear-gradient(180deg, transparent 0 31px, rgba(255,255,255,.018) 31px 32px);
    mask-image: linear-gradient(180deg, rgba(0,0,0,.82), rgba(0,0,0,.25) 80%, transparent);
    pointer-events: none;
  }

  .deck-head {
    position: absolute;
    top: 10px;
    left: 9px;
    right: 9px;
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: 8px;
    z-index: 7;
    pointer-events: none;
  }

  .load-button {
    min-width: 54px;
    height: 31px;
    border: 1px solid rgba(var(--accent-rgb), .24);
    border-radius: 999px;
    padding: 0 11px;
    background: rgba(10,13,18,.64);
    box-shadow: inset 0 1px rgba(255,255,255,.06), 0 7px 18px rgba(0,0,0,.22);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    font-weight: 800;
    font-size: 11px;
    letter-spacing: .13em;
    pointer-events: auto;
  }
  .load-button:active { transform: scale(.96); }

  .file-meta { min-width: 0; line-height: 1.04; opacity: .80; }
  .file-name {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    font-size: 10px;
    letter-spacing: .04em;
    color: rgba(244,247,255,.80);
  }
  .time-readout {
    margin-top: 5px;
    font: 700 10px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: rgba(var(--accent-rgb), .94);
  }

  .overview-wrap {
    position: absolute;
    left: 8px;
    right: 8px;
    top: 53px;
    height: min(27dvh, 224px);
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.045);
    background:
      linear-gradient(180deg, rgba(255,255,255,.025), transparent),
      rgba(4,6,10,.27);
    box-shadow: inset 0 -20px 40px rgba(0,0,0,.18);
    pointer-events: auto;
    touch-action: none;
  }

  canvas { display: block; width: 100%; height: 100%; }

  .scope-wrap {
    position: absolute;
    left: 4px;
    right: 4px;
    top: min(34dvh, 290px);
    height: 82px;
    opacity: .82;
    pointer-events: none;
    mask-image: linear-gradient(90deg, transparent, #000 12% 88%, transparent);
  }

  .scope-center {
    position: absolute;
    left: 50%;
    top: 5px;
    bottom: 5px;
    width: 1px;
    transform: translateX(-.5px);
    background: rgba(var(--accent-rgb), .88);
    box-shadow: 0 0 10px rgba(var(--accent-rgb), .45);
    pointer-events: none;
  }

  .empty-message {
    position: absolute;
    top: calc(min(34dvh, 290px) + 29px);
    left: 10px;
    right: 10px;
    text-align: center;
    font-size: 9px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: rgba(224,231,243,.34);
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .deck.loaded .empty-message { opacity: 0; }

  .thumb-instrument {
    --wheel-angle: 0deg;
    --teeth: 32;
    position: absolute;
    width: calc(var(--wheel-size) + 28px);
    height: calc(var(--wheel-size) + 28px);
    top: var(--thumb-y);
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    opacity: var(--active-opacity);
    transition: opacity .28s ease, filter .28s ease, transform .2s ease;
    contain: layout style;
  }

  .thumb-instrument.idle:not(.dragging):not(.gear-dragging) {
    opacity: var(--idle-opacity);
    filter: saturate(.55) contrast(.94);
  }
  .thumb-instrument.ghost:not(.dragging):not(.gear-dragging) {
    opacity: var(--ghost-opacity);
    filter: saturate(.30) contrast(.88);
  }

  .wheel-hit {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    touch-action: none;
  }

  .wheel-shadow {
    position: absolute;
    inset: 15px 11px 5px 11px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,0,0,.72) 0 43%, transparent 72%);
    filter: blur(13px);
    pointer-events: none;
  }

  .wheel-ring {
    position: absolute;
    width: var(--wheel-size);
    height: var(--wheel-size);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background:
      conic-gradient(from 12deg, #080b10, #303744 13%, #0a0c11 27%, #252c36 44%, #090b10 61%, #343c48 77%, #080b10);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.09),
      inset 0 0 0 7px rgba(0,0,0,.18),
      inset 0 12px 18px rgba(255,255,255,.045),
      inset 0 -15px 24px rgba(0,0,0,.66),
      0 11px 30px rgba(0,0,0,.42);
    pointer-events: none;
  }

  .teeth {
    position: absolute;
    inset: -7px;
    border-radius: 50%;
    transform: rotate(var(--wheel-angle));
    pointer-events: none;
  }
  .tooth {
    position: absolute;
    left: calc(50% - 1px);
    top: -1px;
    width: 2px;
    height: 7px;
    border-radius: 2px;
    background: rgba(238,243,252,.22);
    transform-origin: 1px calc(var(--wheel-size) / 2 + 8px);
    opacity: .72;
  }
  .tooth.major {
    width: 3px;
    height: 11px;
    background: rgba(var(--accent-rgb), .72);
    box-shadow: 0 0 8px rgba(var(--accent-rgb), .36);
  }
  .tooth.hot { opacity: 1; background: rgba(255,255,255,.96); }

  .platter {
    position: absolute;
    width: calc(var(--wheel-size) - 18px);
    height: calc(var(--wheel-size) - 18px);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(var(--wheel-angle));
    border-radius: 50%;
    overflow: hidden;
    background:
      radial-gradient(circle at 38% 27%, rgba(255,255,255,.18), transparent 10%),
      repeating-radial-gradient(circle, rgba(255,255,255,.036) 0 1px, transparent 1px 8px),
      repeating-conic-gradient(from 0deg, rgba(255,255,255,.045) 0deg 1deg, transparent 1deg 12deg),
      conic-gradient(from 228deg, #10141c, #272f3a 24%, #090c11 49%, #2a323e 70%, #11151c);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.10),
      inset 0 0 0 8px rgba(0,0,0,.16),
      inset 0 -17px 26px rgba(0,0,0,.50),
      inset 0 13px 19px rgba(255,255,255,.045);
    pointer-events: none;
    will-change: transform;
  }
  .platter::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 7%;
    width: 9px;
    height: 9px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff, #cdd4df 48%, #70798a);
    box-shadow: 0 0 0 3px rgba(255,255,255,.055), 0 5px 11px rgba(0,0,0,.55);
  }
  .platter::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1px;
    height: 42%;
    transform: translate(-50%, 0);
    background: linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,255,255,.06), transparent);
    opacity: .32;
  }

  .center-button {
    position: absolute;
    left: 50%;
    top: 50%;
    width: calc(var(--wheel-size) * .35);
    height: calc(var(--wheel-size) * .35);
    transform: translate(-50%, -50%);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 50%;
    background:
      radial-gradient(circle at 42% 30%, rgba(255,255,255,.10), transparent 38%),
      linear-gradient(150deg, rgba(20,25,33,.97), rgba(5,7,10,.98));
    box-shadow:
      inset 0 1px rgba(255,255,255,.08),
      inset 0 -9px 13px rgba(0,0,0,.50),
      0 5px 12px rgba(0,0,0,.42);
    font-weight: 900;
    font-size: clamp(13px, 4vw, 19px);
    line-height: 1;
    padding: 0;
    z-index: 3;
    touch-action: manipulation;
  }
  .center-button:active, .center-button.down {
    transform: translate(-50%, -48%) scale(.96);
    box-shadow: inset 0 5px 12px rgba(0,0,0,.65), 0 2px 4px rgba(0,0,0,.38);
  }
  .deck.playing .center-button {
    color: rgb(var(--accent-rgb));
    text-shadow: 0 0 12px rgba(var(--accent-rgb), .55);
  }

  .gear {
    position: absolute;
    top: 50%;
    width: 31px;
    height: calc(var(--wheel-size) * .74);
    transform: translateY(-50%);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.065);
    background: rgba(10,13,18,.46);
    box-shadow: inset 0 1px rgba(255,255,255,.06), 0 7px 18px rgba(0,0,0,.24);
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
    touch-action: none;
  }
  .deck.left .gear { left: -3px; }
  .deck.right .gear { right: -3px; }

  .gear-track {
    position: absolute;
    left: 50%;
    top: 10px;
    bottom: 10px;
    width: 5px;
    transform: translateX(-50%);
    border-radius: 99px;
    background: rgba(255,255,255,.07);
  }
  .gear-jumper {
    position: absolute;
    left: 50%;
    top: var(--gear-y, 50%);
    width: 25px;
    height: 18px;
    transform: translate(-50%, -50%);
    border-radius: 10px;
    background: linear-gradient(180deg, #e3e8f0, #8490a2);
    box-shadow: inset 0 1px #fff, 0 4px 10px rgba(0,0,0,.45);
  }
  .gear-value {
    position: absolute;
    left: 50%;
    top: -15px;
    transform: translateX(-50%);
    color: rgba(var(--accent-rgb), .94);
    font: 800 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    white-space: nowrap;
  }

  .velocity-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    pointer-events: none;
    opacity: var(--velocity-light, 0);
    background: radial-gradient(circle, transparent 54%, rgba(var(--accent-rgb), .12) 61%, transparent 69%);
    box-shadow: 0 0 calc(8px + var(--velocity-light, 0) * 16px) rgba(var(--accent-rgb), .20);
  }

  .deck-status {
    position: absolute;
    top: calc(var(--thumb-y) + var(--wheel-size) * .55);
    left: 8px;
    right: 8px;
    text-align: center;
    pointer-events: none;
    font: 800 9px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .08em;
    color: rgba(227,233,244,.32);
    transition: opacity .25s ease;
  }
  .deck.loaded .deck-status { color: rgba(var(--accent-rgb), .46); }

  .settings-button {
    position: fixed;
    left: 50%;
    bottom: calc(9px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 20;
    width: 40px;
    height: 22px;
    padding: 0;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 999px;
    background: rgba(10,12,16,.62);
    color: rgba(241,244,250,.48);
    font-size: 16px;
    line-height: 1;
    backdrop-filter: blur(7px);
    -webkit-backdrop-filter: blur(7px);
  }

  .settings {
    position: fixed;
    left: 50%;
    bottom: calc(38px + env(safe-area-inset-bottom));
    width: min(330px, calc(100vw - 22px));
    transform: translate(-50%, 14px) scale(.98);
    transform-origin: 50% 100%;
    z-index: 19;
    padding: 13px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 17px;
    background: rgba(9,12,17,.91);
    box-shadow: 0 18px 50px rgba(0,0,0,.58);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
  }
  .settings.open { opacity: 1; transform: translate(-50%, 0) scale(1); pointer-events: auto; }
  .setting-row { display: grid; grid-template-columns: 88px 1fr 42px; gap: 8px; align-items: center; margin: 7px 0; font-size: 11px; color: rgba(241,245,252,.72); }
  .setting-row output { text-align: right; font: 800 10px/1 ui-monospace, monospace; color: rgba(255,255,255,.90); }
  input[type="range"] { min-width: 0; accent-color: #b8c3d4; }
  .setting-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .setting-actions button {
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 11px;
    padding: 9px 8px;
    background: rgba(255,255,255,.045);
    font-weight: 800;
    font-size: 11px;
  }

  .toast {
    position: fixed;
    left: 50%;
    top: calc(10px + env(safe-area-inset-top));
    transform: translate(-50%, -12px);
    z-index: 30;
    max-width: calc(100vw - 30px);
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(9,12,17,.88);
    border: 1px solid rgba(255,255,255,.08);
    font-size: 11px;
    color: rgba(248,250,255,.84);
    opacity: 0;
    pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }



  .bridge {
    position: fixed;
    left: 50%;
    top: 43dvh;
    transform: translate(-50%, -50%);
    z-index: 16;
    width: min(330px, calc(100vw - 30px));
    height: 36px;
    display: grid;
    grid-template-columns: 42px 42px minmax(92px, 1fr) 40px 36px;
    align-items: center;
    gap: 4px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,.065);
    border-radius: 999px;
    background: rgba(7,10,14,.48);
    box-shadow: inset 0 1px rgba(255,255,255,.045), 0 8px 26px rgba(0,0,0,.25);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    opacity: .72;
    transition: opacity .25s ease, transform .18s ease;
    touch-action: manipulation;
  }
  .bridge.idle { opacity: .15; }
  .bridge:focus-within, .bridge.active { opacity: .96; }
  .bridge button {
    height: 27px;
    min-width: 0;
    padding: 0 5px;
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 999px;
    background: rgba(255,255,255,.035);
    color: rgba(240,244,252,.62);
    font: 850 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: .08em;
  }
  .bridge button:active { transform: scale(.95); }
  .bridge button.on {
    color: rgba(255,255,255,.96);
    border-color: rgba(183,204,235,.28);
    background: rgba(183,204,235,.12);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.025), 0 0 13px rgba(153,183,225,.10);
  }
  .bridge button.recording {
    color: #ffdfe4;
    border-color: rgba(255,105,129,.34);
    background: rgba(255,77,108,.15);
  }
  .bridge button.ready { color: rgba(210,232,255,.93); }
  .xfader {
    min-width: 0;
    display: grid;
    grid-template-columns: 9px minmax(0, 1fr) 9px;
    align-items: center;
    gap: 3px;
    padding: 0 3px;
    color: rgba(238,242,249,.38);
    font: 800 8px/1 ui-monospace, monospace;
  }
  .xfader input { width: 100%; min-width: 0; height: 23px; accent-color: #d8dee9; }

  .thumb-instrument.dragging .wheel-ring,
  .thumb-instrument.linked .wheel-ring,
  .thumb-instrument.replaying .wheel-ring {
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,.13),
      inset 0 0 0 7px rgba(0,0,0,.18),
      inset 0 12px 18px rgba(255,255,255,.045),
      inset 0 -15px 24px rgba(0,0,0,.66),
      0 0 0 2px rgba(var(--accent-rgb), .13),
      0 13px 34px rgba(0,0,0,.48);
  }
  .thumb-instrument.linked::after,
  .thumb-instrument.replaying::after {
    content: "";
    position: absolute;
    inset: 2px;
    border: 1px dashed rgba(var(--accent-rgb), .26);
    border-radius: 50%;
    pointer-events: none;
  }

  .settings { max-height: min(72dvh, 560px); overflow: auto; }
  .setting-row select,
  .setting-row .toggle-field {
    width: 100%;
    min-width: 0;
    height: 28px;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 9px;
    background: rgba(255,255,255,.04);
    color: rgba(248,250,255,.88);
    padding: 0 7px;
    font: 750 10px/1 ui-monospace, monospace;
  }
  .setting-row .toggle-field.on { background: rgba(183,204,235,.12); color: #fff; }
  .settings-title {
    margin: 2px 0 9px;
    color: rgba(244,247,252,.44);
    font: 850 9px/1 ui-monospace, monospace;
    letter-spacing: .14em;
    text-transform: uppercase;
  }

  @media (orientation: landscape) {
    :root { --thumb-y: 58dvh; --wheel-size: min(27dvh, 150px); }
    .overview-wrap { height: 27dvh; }
    .scope-wrap { top: 37dvh; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition-duration: .01ms !important; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <section class="deck left" data-side="left" aria-label="Left scratch deck">
    <div class="deck-head">
      <button class="load-button" type="button">LOAD A</button>
      <div class="file-meta">
        <div class="file-name">No audio loaded</div>
        <div class="time-readout">00:00.000 / 00:00.000</div>
      </div>
    </div>
    <input class="file-input" type="file" accept="audio/*,video/*" hidden />
    <div class="overview-wrap"><canvas class="overview"></canvas></div>
    <div class="scope-wrap"><canvas class="scope"></canvas><div class="scope-center"></div></div>
    <div class="empty-message">load audio · turn platter</div>
    <div class="thumb-instrument">
      <div class="wheel-shadow"></div>
      <div class="wheel-ring">
        <div class="teeth"></div>
        <div class="platter"></div>
        <div class="velocity-glow"></div>
      </div>
      <div class="wheel-hit"></div>
      <button class="center-button" type="button" aria-label="Play or pause left deck">A</button>
      <div class="gear" aria-label="Left deck scrub fineness">
        <div class="gear-value">1.0s</div>
        <div class="gear-track"></div>
        <div class="gear-jumper"></div>
      </div>
    </div>
    <div class="deck-status">PRESS = PLAY · TURN = VINYL</div>
  </section>

  <section class="deck right" data-side="right" aria-label="Right scratch deck">
    <div class="deck-head">
      <button class="load-button" type="button">LOAD B</button>
      <div class="file-meta">
        <div class="file-name">No audio loaded</div>
        <div class="time-readout">00:00.000 / 00:00.000</div>
      </div>
    </div>
    <input class="file-input" type="file" accept="audio/*,video/*" hidden />
    <div class="overview-wrap"><canvas class="overview"></canvas></div>
    <div class="scope-wrap"><canvas class="scope"></canvas><div class="scope-center"></div></div>
    <div class="empty-message">load audio · turn platter</div>
    <div class="thumb-instrument">
      <div class="wheel-shadow"></div>
      <div class="wheel-ring">
        <div class="teeth"></div>
        <div class="platter"></div>
        <div class="velocity-glow"></div>
      </div>
      <div class="wheel-hit"></div>
      <button class="center-button" type="button" aria-label="Play or pause right deck">B</button>
      <div class="gear" aria-label="Right deck scrub fineness">
        <div class="gear-value">1.0s</div>
        <div class="gear-track"></div>
        <div class="gear-jumper"></div>
      </div>
    </div>
    <div class="deck-status">PRESS = PLAY · TURN = VINYL</div>
  </section>
</div>

<div class="bridge" id="bridge" aria-label="Dual deck bridge">
  <button id="linkButton" type="button" aria-pressed="false">LINK</button>
  <button id="slipButton" type="button" aria-pressed="false">SLIP</button>
  <label class="xfader" aria-label="Crossfader">
    <span>A</span><input id="crossfader" type="range" min="0" max="100" step="1" value="50" /><span>B</span>
  </label>
  <button id="recordButton" type="button" aria-pressed="true">REC</button>
  <button id="replayButton" type="button" disabled aria-label="Replay the last recorded platter gestures">↻</button>
</div>

<button class="settings-button" id="settingsButton" type="button" aria-label="Open layout tuner">···</button>
<section class="settings" id="settingsPanel" aria-label="Layout and feel tuner">
  <div class="settings-title">placement</div>
  <label class="setting-row">
    <span>Thumb height</span>
    <input id="thumbY" type="range" min="44" max="80" step="1" value="62" />
    <output id="thumbYOut">62%</output>
  </label>
  <label class="setting-row">
    <span>Wheel size</span>
    <input id="wheelSize" type="range" min="112" max="190" step="2" value="156" />
    <output id="wheelSizeOut">156px</output>
  </label>
  <label class="setting-row">
    <span>Idle ghost</span>
    <input id="idleOpacity" type="range" min="5" max="45" step="1" value="20" />
    <output id="idleOpacityOut">20%</output>
  </label>
  <div class="settings-title">platter physics</div>
  <label class="setting-row">
    <span>Feel</span>
    <select id="feelPreset">
      <option value="light">Light</option>
      <option value="vinyl" selected>Vinyl</option>
      <option value="heavy">Heavy</option>
      <option value="precision">Precision</option>
      <option value="custom">Custom</option>
    </select>
    <output id="feelOut">VINYL</output>
  </label>
  <label class="setting-row">
    <span>Motion delay</span>
    <input id="controlDelay" type="range" min="4" max="28" step="1" value="12" />
    <output id="controlDelayOut">12ms</output>
  </label>
  <label class="setting-row">
    <span>Motor pull</span>
    <input id="motorPull" type="range" min="4" max="40" step="1" value="15" />
    <output id="motorPullOut">15</output>
  </label>
  <label class="setting-row">
    <span>Coast drag</span>
    <input id="coast" type="range" min="1" max="14" step="0.1" value="4.8" />
    <output id="coastOut">4.8</output>
  </label>
  <label class="setting-row">
    <span>Sound</span>
    <button class="toggle-field on" id="qualityToggle" type="button" aria-pressed="true">CLEAN</button>
    <output id="trajectoryOut">SAB</output>
  </label>
  <div class="setting-actions">
    <button id="copySetup" type="button">Copy setup</button>
    <button id="resetLayout" type="button">Reset layout</button>
  </div>
</section>
<div class="toast" id="toast"></div>

<script type="module" src="./app.js"></script>
</body>
</html>
